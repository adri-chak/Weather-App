<!DOCTYPE html>
<html>

<head>
    <title>Weather App</title>
</head>

<body>

    <h1>Weather App</h1>

    <input
        type="text"
        id="city"
        placeholder="Enter city">

    <button onclick="getWeather()">
        Search
    </button>

    <div id="result"></div>

    <script>

        function getWeather() {
        let city = document.getElementById("city").value;

        alert(city);
        }

    </script>

</body>

</html>
